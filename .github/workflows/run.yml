name: 更新 KOL 数据

on:
  # 允许在 GitHub 网页上手动点按钮触发
  workflow_dispatch:
  # 允许 cron-job.org 从外部发请求触发（这是关键）
  repository_dispatch:
    types: [run-fetch]
  # 兜底：GitHub 自带定时（不稳定，仅作备份，主力靠 cron-job.org）
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 跑抓取脚本
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        run: python fetch.py

      - name: 提交更新后的 data.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "更新数据" || echo "没有变化，跳过提交"
          git push
